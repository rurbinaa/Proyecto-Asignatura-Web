services:

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_app
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py shell -c 'from quality_data.init_data_models import COMPANY_COLORS, GARMENT_DEFECT_TYPES, CONTAINER_DEFECT_TYPES; from quality_data.models import Color, DefectType, ContainerDefectType; [Color.objects.get_or_create(name=n, defaults={\"is_active\": True}) for n in COMPANY_COLORS]; [DefectType.objects.get_or_create(name=n) for n in GARMENT_DEFECT_TYPES]; [ContainerDefectType.objects.get_or_create(name=n) for n in CONTAINER_DEFECT_TYPES]; print(\"DB seeded\")' &&
             python manage.py bootstrap_auth_users &&
             daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    volumes:
      - ./backend:/app
      - ./docs:/app/docs:ro
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DJANGO_DEBUG=True
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=backend.settings


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    working_dir: /app
    command: >
      sh -c "bun install || true && bun run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - BROWSER=none
    depends_on:
      - db
      - backend

volumes:
  postgres_data_dev:
    driver: local
  redis_data:
    driver: local
